<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <div class="form-container">
        <h1>Formulário</h1>
        <style>
            body{
                font-family: Arial, sans-serif;
                margin: 100px;
                padding: 100px;
                background-color: beige;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }  

            .form-container{
                background-color: rgb(12, 12, 141);
                border-radius: 10px;
                box-shadow: 0 4px 8px rgba(red, green, blue, alpha);
                padding: 30px;
                width: 100%;
                max-width: 400px;
            }

            h1{
                text-align: center;
                color: blueviolet;
                margin-bottom: 30px;
            }

            form{
                display: flex;
                flex-direction: column;
            }
            
            .form-container{
                margin-bottom: 20px;/* Espaçamento para baixo */
            }

            label{
                font-weight: bold;/* tipo da letra, expessura e etc, aqui deixa em negrito */
                margin-bottom: 5px;/* Espaçamento para baixo */
                display: block;/* não se movimentar e não ser afetado por estilo dos outros elementos*/
            }

            input,
            textarea,
            select,
            button{
                width: 100%;/* */
                padding: 12px;/**/
                margin-top: 5px;/**/
                border-radius: 5px;/**/
                border: 1px solid #ccc;/**/
                font-size: 14px;/**/
                box-sizing: border-box;/**/
                background-color: aquamarine;/**/
            }
            
            input[type="radio"],
            input[type="checkbox"]{
                display: inline-block;
                width: auto;
                margin-right: 10px;
            }

            button{
                background-color: black;
                color: white;
                border: none;
                cursor: pointer;
                transition: background-color 0.3s;
            }

            button:hover{
                background-color: rgb(111, 111, 111);
            }
        </style>
        <form method="POST" action="http://3003/usuarios">
            <input type="hidden" name="id" value="3">

            <div class="form-group">
                <label for="name">Nome</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input
                    type="password"
                    name="senha"
                    id="senha"
                    placeholder="Digite sua senha">
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea
                    name="bio"
                    id="bio"
                    cols="30"
                    rows="10"
                    placeholder="Conte um pouco sobre você"
                ></textarea>
            </div>
            <fieldset class="form-group">
                <legend>Tipo de Usuário</legend>
                <label for="admin">
                    <input
                        type="radio"
                        id="admin"
                        name="tipo"
                        value="admin">Admin
                </label>
                <label for="regular">
                    <input
                       type="radio"
                       name="tipo"
                       id="regular"
                       value="regular">Regular
                </label>
                <label for="professor">
                    <input 
                        type="radio"
                        name="tipo"
                        id="professor"
                        value="professor">Professor
                </label>
            </fieldset>

            <div class="form-group">
                <label for="estado">Estado</label>
                <select name="estado" id="estado">
                    <option value="">Selecione</option>
                    <option value="pr">Paraná</option>
                    <option value="sc">Santa Catarina</option>
                    <option value="pr">Rio Grande do Sul</option>
                </select>
            </div>
            <div class="form-group">
                <label for="interesses">interesses</label>
                <select name="interesses" id="interesses" multiple size="7">
                    <option value="js">JavaScript</option>
                    <option value="java">Java</option>
                    <option value="php">PHP</option>
                    <option value="go">Go</option>
                    <option value="c">C</option>
                    <option value="c++">C++</option>
                    <option value="c++">C++</option>
                    <option value="c#">C#</option>
                </select>
            </div>

            <div class="form-group buttons">
                <button type="submit">
                    Incluir
                </button>
                <button formaction="http://localhost:3003/usuario/3" type="submit">
                    Alterar
                </button>
            </div>
        </form>
    </div>
</body>
</html>
