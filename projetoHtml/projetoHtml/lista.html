<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
    <link rel="stylesheet" href="lista.css">
</head>
<body>
    <h1>Listas</h1>
    <!-- Lista Ordenada -->
    <h2>Aprovados</h2>
    <ol>
        <li>Bia</li>
        <li>Pedro</li>
        <li>Ana</li>
        <li>João</li>
    </ol>
    
    <!-- Lista não ordenada -->
     <h2>Lista de Compras</h2>
     <ul>
        <li>Pão</li>
        <li>Ronaldo</li>
        <li>Viado</li>
        <li>Merda</li>
     </ul>

     <!-- Lista de Definição -->
      <h2>Principais termos do glossário de Cloud Computing</h2>
      <dl>
        <dt>BaaS</dt>
        <dd>Backend Como Serviço</dd>
        <dt>IaaS</dt>
        <dd>Infraestrutura Como Serviço</dd>
        <dt>PaaS</dt>
        <dd>Plataforma Como Serviço</dd>
        <dt>SaaS</dt>
        <dd>Software Como Serviço</dd>
      </dl>
      
</body>
</html>
